<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Thali">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F1EFE2">
<title>Thali Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1EFE2; --card:#FFFFFF; --ink:#2A2C22; --muted:#8B8570;
    --line:#DAD6C4; --mustard:#C98A1F; --moong:#4B6B3A; --teal:#3E6E68;
    --brick:#B5482F; --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;padding-bottom:40px;}
  .wrap{max-width:520px;margin:0 auto;padding:18px 16px 0;}
  .title-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
  .title-row h1{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin:0;letter-spacing:-0.01em;}
  .title-row .sub{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
  .sync-badge{font-size:10.5px;font-weight:600;padding:4px 8px;border-radius:999px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.02em;cursor:pointer;}
  .sync-badge.online{background:#E6EEDF;color:var(--moong);}
  .sync-badge.offline{background:#EFEDE0;color:var(--muted);}
  .sync-badge.error{background:#F5E3DC;color:var(--brick);}
  .sync-badge.syncing{background:#FBF3E4;color:var(--mustard);}
  .date-strip{font-family:'Fraunces',serif;font-size:14px;font-weight:500;color:var(--ink);margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;justify-content:space-between;}
  .date-strip .day{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-family:'Inter',sans-serif;font-weight:600;}
  .person-tabs{display:flex;gap:8px;margin-bottom:14px;}
  .person-tab{flex:1;padding:10px 0;text-align:center;border-radius:999px;border:1.5px solid var(--line);background:var(--card);font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s ease;}
  .person-tab.active{border-color:var(--ink);color:var(--ink);background:var(--card);box-shadow:0 2px 0 var(--ink);}
  .nav-tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1.5px solid var(--line);}
  .nav-tab{flex:1;padding:9px 0;text-align:center;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;text-transform:uppercase;letter-spacing:0.04em;}
  .nav-tab.active{color:var(--ink);border-bottom-color:var(--mustard);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;}
  .card h2{font-family:'Fraunces',serif;font-size:15px;font-weight:600;margin:0 0 10px;display:flex;align-items:center;justify-content:space-between;}
  .card h2 .cnt{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);font-weight:500;}
  .ring-card{display:flex;align-items:center;gap:18px;}
  .ring-legend{flex:1;display:flex;flex-direction:column;gap:8px;}
  .legend-row{display:flex;align-items:center;gap:8px;font-size:12.5px;}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .legend-row .num{font-family:'IBM Plex Mono',monospace;margin-left:auto;font-size:12.5px;font-weight:600;}
  .legend-row .lbl{color:var(--muted);}
  .progress-hero{display:flex;align-items:baseline;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .progress-hero .big{font-family:'Fraunces',serif;font-size:32px;font-weight:600;line-height:1;color:var(--moong);}
  .progress-hero .big.warn{color:var(--brick);}
  .progress-hero .unit{font-size:14px;color:var(--muted);}
  .progress-hero .caption{margin-left:auto;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;}
  .progress-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .progress-cell{padding:10px 12px;background:#FAF9F1;border-radius:9px;}
  .progress-cell .v{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;}
  .progress-cell .v.warn{color:var(--brick);}
  .progress-cell .v.good{color:var(--moong);}
  .progress-cell .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
  .progress-note{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.5;}
  .meal-block{margin-bottom:4px;}
  .item-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .item-row:last-of-type{border-bottom:none;}
  .item-main{flex:1;min-width:0;}
  .item-name{font-weight:500;}
  .item-qty{color:var(--muted);font-size:12px;}
  .item-macros{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-align:right;white-space:nowrap;}
  .icon-btn{border:none;background:none;color:var(--muted);cursor:pointer;padding:4px;font-size:15px;line-height:1;flex-shrink:0;}
  .icon-btn:hover{color:var(--ink);}
  .icon-btn.danger:hover{color:var(--brick);}
  .add-item-btn{width:100%;padding:9px 0;margin-top:6px;background:none;border:1.5px dashed var(--line);border-radius:9px;color:var(--muted);font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:0.02em;}
  .add-item-btn:hover{border-color:var(--mustard);color:var(--mustard);}
  .edit-form{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:10px 0;border-bottom:1px solid var(--line);}
  .edit-form input{border:1px solid var(--line);border-radius:7px;padding:7px 8px;font-family:'Inter',sans-serif;font-size:13px;background:#FAF9F1;color:var(--ink);}
  .edit-form input.full{grid-column:1/3;}
  .edit-form .macro-inputs{grid-column:1/3;display:flex;gap:6px;}
  .edit-form .macro-inputs input{flex:1;}
  .edit-form .macro-inputs label{font-size:9.5px;color:var(--muted);display:block;margin-bottom:2px;}
  .edit-form .form-actions{grid-column:1/3;display:flex;gap:8px;justify-content:flex-end;}
  .btn{padding:7px 14px;border-radius:7px;border:none;font-size:12.5px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
  .btn-save{background:var(--moong);color:#fff;}
  .btn-cancel{background:none;color:var(--muted);}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-secondary{background:#FAF9F1;color:var(--ink);border:1px solid var(--line);}
  .burn-row{display:flex;align-items:center;gap:10px;}
  .burn-row input{width:100px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:'IBM Plex Mono',monospace;font-size:14px;text-align:center;}
  .deficit-pill{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;padding:5px 10px;border-radius:999px;}
  .deficit-good{background:#E6EEDF;color:var(--moong);}
  .deficit-warn{background:#F5E3DC;color:var(--brick);}
  .deficit-neutral{background:#EFEDE0;color:var(--muted);}
  .day-picker{display:flex;gap:5px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;}
  .day-chip{flex-shrink:0;padding:8px 13px;border-radius:9px;border:1.5px solid var(--line);background:var(--card);font-size:12.5px;font-weight:600;cursor:pointer;color:var(--muted);}
  .day-chip.active{border-color:var(--mustard);color:var(--ink);background:#FBF3E4;}
  .week-summary{display:flex;gap:10px;}
  .week-summary .stat{flex:1;text-align:center;}
  .week-summary .stat .v{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;}
  .week-summary .stat .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
  .week-note{font-size:11.5px;color:var(--muted);margin-top:8px;text-align:center;}
  .field-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);gap:10px;}
  .field-row:last-child{border-bottom:none;}
  .field-row label{font-size:13.5px;}
  .field-row input{width:80px;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-family:'IBM Plex Mono',monospace;text-align:center;font-size:13.5px;}
  .field-row input.wide{width:100%;font-family:'Inter',sans-serif;text-align:left;font-size:12px;}
  .milestone-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .milestone-row .date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
  .milestone-row .txt{flex:1;}
  .milestone-form{display:flex;gap:6px;margin-top:10px;}
  .milestone-form input{border:1px solid var(--line);border-radius:7px;padding:8px 9px;font-size:13px;font-family:'Inter',sans-serif;}
  .milestone-form input[type=date]{width:135px;flex-shrink:0;}
  .milestone-form input[type=text]{flex:1;min-width:0;}
  .empty-note{color:var(--muted);font-size:12.5px;font-style:italic;padding:6px 0;}
  .reset-link{display:block;text-align:center;margin-top:10px;font-size:11.5px;color:var(--muted);text-decoration:underline;cursor:pointer;background:none;border:none;width:100%;}
  .hint{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5;}
  .sync-config{display:flex;flex-direction:column;gap:8px;}
  .sync-config .url-input{width:100%;border:1px solid var(--line);border-radius:7px;padding:8px 9px;font-family:'IBM Plex Mono',monospace;font-size:11px;background:#FAF9F1;color:var(--ink);}
  .sync-config .btn-row{display:flex;gap:8px;}
  .sync-config .btn-row .btn{flex:1;}
  .sync-status{font-size:11.5px;color:var(--muted);}
  .sync-status.ok{color:var(--moong);}
  .sync-status.err{color:var(--brick);}
</style>
</head>
<body>
<div class="wrap" id="app">Loading…</div>

<script>
/* ============ CONSTANTS ============ */
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MEAL_TYPES = [['breakfast','Breakfast'],['lunch','Lunch'],['dinner','Dinner'],['snack','Snack']];
const PEOPLE = ['Arya','Onkar'];
const KCAL_PER_KG_FAT = 7700;

function emptyDayPlan(){ return {breakfast:[],lunch:[],dinner:[],snack:[]}; }
function emptyWeekPlan(){ const w={}; DAYS.forEach(d=>w[d]=emptyDayPlan()); return w; }

const DEFAULT_PLANS = {
  Arya: (()=>{
    const w = emptyWeekPlan();
    w.Mon = {
      breakfast:[{name:'Apple + pear',qty:'600g',cal:330,protein:2,fiber:15}],
      lunch:[
        {name:'Salad (cucumber, tomato)',qty:'150g',cal:40,protein:2,fiber:3},
        {name:'Garbanzo beans, cooked',qty:'40g dry',cal:145,protein:8,fiber:5},
        {name:'Green moong, sprouted',qty:'20g dry',cal:65,protein:5,fiber:3},
        {name:'Green moong usal',qty:'30g dry',cal:100,protein:7,fiber:3},
        {name:'Roti (1) or rice ¾ cup',qty:'1 / 150g',cal:190,protein:3,fiber:1}
      ],
      dinner:[
        {name:'Salad (cucumber, tomato)',qty:'150g',cal:40,protein:2,fiber:3},
        {name:'Garbanzo beans, cooked',qty:'40g dry',cal:145,protein:8,fiber:5},
        {name:'Green moong, sprouted',qty:'20g dry',cal:65,protein:5,fiber:3},
        {name:'Green moong usal',qty:'30g dry',cal:100,protein:7,fiber:3},
        {name:'Roti (1) or rice ¾ cup',qty:'1 / 150g',cal:190,protein:3,fiber:1}
      ],
      snack:[
        {name:'Greek yogurt',qty:'200g',cal:120,protein:12,fiber:0},
        {name:'Almonds',qty:'15g',cal:85,protein:3,fiber:1.5}
      ]
    };
    return w;
  })(),
  Onkar: emptyWeekPlan()
};

const DEFAULT_TARGETS = {
  Arya:{calories:1650,protein:70,fiber:35},
  Onkar:{calories:2200,protein:90,fiber:30}
};

function defaultPersonData(person){
  return {
    targets: JSON.parse(JSON.stringify(DEFAULT_TARGETS[person])),
    plan: JSON.parse(JSON.stringify(DEFAULT_PLANS[person])),
    milestones: [],
    logs: {}
  };
}

/* ============ STORAGE / SYNC LAYER ============ */
const store = {
  apiUrl: localStorage.getItem('thali:apiUrl') || 'https://script.google.com/macros/s/AKfycby2f7z-9OiRif6YWyq3wrhKDjG688TD8TrsNdtmtc55a-Jii1MdJdS5MmT58CLE6gAa7Q/exec',
  syncState: 'idle', // 'idle'|'syncing'|'ok'|'error'|'offline'
  lastSyncAt: null,
  lastError: null,

  cacheKey(person){ return 'thali:cache:'+person; },

  readCache(person){
    try{
      const raw = localStorage.getItem(this.cacheKey(person));
      return raw ? JSON.parse(raw) : null;
    }catch(e){ return null; }
  },
  writeCache(person, data){
    try{ localStorage.setItem(this.cacheKey(person), JSON.stringify(data)); }catch(e){}
  },

  async loadPerson(person){
    if(this.apiUrl){
      this.syncState='syncing'; render();
      try{
        const resp = await fetch(`${this.apiUrl}?action=load&person=${encodeURIComponent(person)}`, {
          method:'GET', redirect:'follow'
        });
        if(!resp.ok) throw new Error('HTTP '+resp.status);
        const data = await resp.json();
        if(data && data.error) throw new Error(data.error);
        // Merge in defaults for anything missing (e.g., new person)
        const merged = {
          targets: data.targets || defaultPersonData(person).targets,
          plan: data.plan || defaultPersonData(person).plan,
          milestones: data.milestones || [],
          logs: data.logs || {}
        };
        // If plan is completely empty for Arya, keep the default Monday seed
        if(person==='Arya' && Object.values(merged.plan).every(d => !d.breakfast?.length && !d.lunch?.length && !d.dinner?.length && !d.snack?.length)){
          merged.plan = defaultPersonData('Arya').plan;
        }
        this.writeCache(person, merged);
        this.syncState='ok'; this.lastSyncAt=new Date(); this.lastError=null;
        return merged;
      }catch(e){
        this.syncState='error'; this.lastError=e.message;
        const cached = this.readCache(person);
        return cached || defaultPersonData(person);
      }
    }
    // No API — pure local mode
    this.syncState='offline';
    const cached = this.readCache(person);
    return cached || defaultPersonData(person);
  },

  async savePerson(person, data){
    this.writeCache(person, data);
    if(!this.apiUrl){ this.syncState='offline'; return; }
    this.syncState='syncing'; render();
    try{
      await fetch(this.apiUrl, {
        method:'POST',
        redirect:'follow',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({action:'save', person, data})
      });
      this.syncState='ok'; this.lastSyncAt=new Date(); this.lastError=null;
    }catch(e){
      this.syncState='error'; this.lastError=e.message;
    }
    render();
  },

  setApiUrl(url){
    url = (url||'').trim();
    this.apiUrl = url || null;
    if(url) localStorage.setItem('thali:apiUrl', url);
    else localStorage.removeItem('thali:apiUrl');
  },

  async testConnection(){
    if(!this.apiUrl) return {ok:false, error:'No URL set'};
    try{
      const resp = await fetch(`${this.apiUrl}?action=ping`, {method:'GET', redirect:'follow'});
      if(!resp.ok) return {ok:false, error:'HTTP '+resp.status};
      const data = await resp.json();
      return data.ok ? {ok:true} : {ok:false, error:data.error||'Unknown'};
    }catch(e){ return {ok:false, error:e.message}; }
  }
};

/* ============ DATE HELPERS ============ */
function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function prettyDateLong(){
  const d = new Date();
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function dayNameForDate(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const idx = (d.getDay()+6)%7;
  return DAYS[idx];
}
function mondayOfThisWeekISO(){
  const d = new Date();
  const idx = (d.getDay()+6)%7;
  d.setDate(d.getDate()-idx);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

/* ============ STATE ============ */
const state = {
  person:'Arya',
  tab:'today',
  weekDayPicked: dayNameForDate(todayISO()),
  editing:null,
  data:{}, // {personName: personData}
  loading:true,
  syncMsg:null
};

async function loadPerson(person){
  const d = await store.loadPerson(person);
  state.data[person] = d;
  // Seed today's log from plan if missing
  const today = todayISO();
  if(!d.logs[today]){
    const dayName = dayNameForDate(today);
    const template = d.plan[dayName] || emptyDayPlan();
    d.logs[today] = {
      meals:{
        breakfast: JSON.parse(JSON.stringify(template.breakfast||[])),
        lunch: JSON.parse(JSON.stringify(template.lunch||[])),
        dinner: JSON.parse(JSON.stringify(template.dinner||[])),
        snack: JSON.parse(JSON.stringify(template.snack||[]))
      },
      caloriesBurned: null
    };
  }
}

async function save(){
  await store.savePerson(state.person, state.data[state.person]);
}

function sumMacros(items){
  return (items||[]).reduce((a,i)=>({
    cal:a.cal+(Number(i.cal)||0),
    protein:a.protein+(Number(i.protein)||0),
    fiber:a.fiber+(Number(i.fiber)||0)
  }),{cal:0,protein:0,fiber:0});
}
function logTotals(log){
  return sumMacros([].concat(log.meals.breakfast||[],log.meals.lunch||[],log.meals.dinner||[],log.meals.snack||[]));
}
function getCumulativeStats(person){
  const pd = state.data[person];
  const result = {allTime:0,week:0,days:0,weekDays:0};
  if(!pd) return result;
  const monday = mondayOfThisWeekISO();
  Object.keys(pd.logs).forEach(dateStr=>{
    const log = pd.logs[dateStr];
    if(log.caloriesBurned==null||log.caloriesBurned==='') return;
    const totals = logTotals(log);
    if(totals.cal<=0) return;
    const deficit = Number(log.caloriesBurned) - totals.cal;
    result.allTime += deficit;
    result.days++;
    if(dateStr >= monday){ result.week += deficit; result.weekDays++; }
  });
  return result;
}
function esc(s){ const d=document.createElement('div'); d.textContent=s==null?'':s; return d.innerHTML; }

/* ============ RENDER ============ */
function syncBadge(){
  const s = store.syncState;
  let label='Local', cls='offline';
  if(!store.apiUrl){ label='Local only'; cls='offline'; }
  else if(s==='syncing'){ label='Syncing…'; cls='syncing'; }
  else if(s==='ok'){ label='Synced'; cls='online'; }
  else if(s==='error'){ label='Sync error'; cls='error'; }
  else { label='Local'; cls='offline'; }
  return `<span class="sync-badge ${cls}" onclick="switchTab('settings')">${label}</span>`;
}

function render(){
  const app = document.getElementById('app');
  if(state.loading){
    app.innerHTML = '<div style="padding:40px 0;text-align:center;color:var(--muted);font-family:Fraunces,serif;font-size:15px;">Loading your thali…</div>';
    return;
  }
  let body='';
  const pd = state.data[state.person];
  if(state.tab==='today') body = renderToday(pd);
  else if(state.tab==='week') body = renderWeek(pd);
  else body = renderSettings(pd);

  app.innerHTML = `
    <div class="title-row">
      <div>
        <h1>Thali Tracker</h1>
        <div class="sub">${state.person}'s plate</div>
      </div>
      ${syncBadge()}
    </div>
    <div class="date-strip">
      <span>${prettyDateLong()}</span>
      <span class="day">${dayNameForDate(todayISO())}</span>
    </div>
    <div class="person-tabs">
      ${PEOPLE.map(p=>`<div class="person-tab ${p===state.person?'active':''}" onclick="switchPerson('${p}')">${p}</div>`).join('')}
    </div>
    <div class="nav-tabs">
      <div class="nav-tab ${state.tab==='today'?'active':''}" onclick="switchTab('today')">Today</div>
      <div class="nav-tab ${state.tab==='week'?'active':''}" onclick="switchTab('week')">Week</div>
      <div class="nav-tab ${state.tab==='settings'?'active':''}" onclick="switchTab('settings')">Settings</div>
    </div>
    ${body}
  `;
}

function renderToday(pd){
  const dateStr = todayISO();
  const log = pd.logs[dateStr];
  const targets = pd.targets;
  const totals = logTotals(log);
  const pct = (v,t)=>t>0?Math.min(v/t,1):0;
  const ringHtml = ringSVG([
    {pct:pct(totals.cal,targets.calories),color:'var(--mustard)',r:38},
    {pct:pct(totals.protein,targets.protein),color:'var(--moong)',r:27},
    {pct:pct(totals.fiber,targets.fiber),color:'var(--teal)',r:16}
  ]);
  const burned = log.caloriesBurned;
  let deficitHtml='', todayDeficit=0;
  if(burned!=null&&burned!==''){
    todayDeficit = Number(burned) - totals.cal;
    const cls = todayDeficit>=300?'deficit-good':(todayDeficit<0?'deficit-warn':'deficit-neutral');
    const label = todayDeficit>=0?`−${Math.round(todayDeficit)} kcal`:`+${Math.round(-todayDeficit)} kcal`;
    deficitHtml = `<span class="deficit-pill ${cls}">${label}</span>`;
  }
  const cum = getCumulativeStats(state.person);
  const progressCard = renderProgressCard(cum);
  let mealsHtml='';
  MEAL_TYPES.forEach(([k,l])=>{ mealsHtml += renderMealBlock(k,l,log.meals[k]); });
  return `
    <div class="card ring-card">
      ${ringHtml}
      <div class="ring-legend">
        <div class="legend-row"><span class="dot" style="background:var(--mustard)"></span><span class="lbl">Calories</span><span class="num">${Math.round(totals.cal)} / ${targets.calories}</span></div>
        <div class="legend-row"><span class="dot" style="background:var(--moong)"></span><span class="lbl">Protein</span><span class="num">${Math.round(totals.protein)}g / ${targets.protein}g</span></div>
        <div class="legend-row"><span class="dot" style="background:var(--teal)"></span><span class="lbl">Fiber</span><span class="num">${Math.round(totals.fiber)}g / ${targets.fiber}g</span></div>
      </div>
    </div>
    <div class="card">
      <h2>Total burned today <span class="cnt">Apple Watch</span></h2>
      <div class="burn-row">
        <input type="number" inputmode="numeric" placeholder="kcal" value="${burned!=null?burned:''}" onchange="setBurned(this.value)">
        ${deficitHtml}
      </div>
    </div>
    ${progressCard}
    ${mealsHtml}
    <button class="reset-link" onclick="resetTodayToPlan()">Reset today to plan</button>
  `;
}

function renderProgressCard(cum){
  const weekTotal = cum.week;
  const allTimeTotal = cum.allTime;
  const kgEq = allTimeTotal / KCAL_PER_KG_FAT;
  const weekKg = weekTotal / KCAL_PER_KG_FAT;
  const bigCls = allTimeTotal>=0?'':'warn';
  const bigDisplay = Math.abs(allTimeTotal)<100 ? Math.round(allTimeTotal) : (Math.round(allTimeTotal/10)*10);
  const kgFormatted = kgEq>=0 ? `≈ ${kgEq.toFixed(2)} kg toward your goal` : `≈ ${Math.abs(kgEq).toFixed(2)} kg in the wrong direction`;
  const weekCls = weekTotal>=0?'good':'warn';
  let hint='';
  if(cum.days===0) hint = `Log a day's total burned kcal (top card) to start tracking your deficit.`;
  else if(cum.days<3) hint = `Early days — the estimate gets more meaningful after a week of logging.`;
  else hint = `Rough guide: ~7,700 kcal deficit ≈ 1 kg of fat. Weight also fluctuates with water, sleep, and cycle — trust the weekly average, not the daily scale.`;
  return `
    <div class="card">
      <h2>Progress <span class="cnt">${cum.days} day${cum.days===1?'':'s'} logged</span></h2>
      <div class="progress-hero">
        <span class="big ${bigCls}">${allTimeTotal>=0?'−':'+'}${Math.abs(bigDisplay).toLocaleString()}</span>
        <span class="unit">kcal all-time</span>
        <span class="caption">${kgFormatted}</span>
      </div>
      <div class="progress-grid">
        <div class="progress-cell">
          <div class="v ${weekCls}">${weekTotal>=0?'−':'+'}${Math.abs(Math.round(weekTotal)).toLocaleString()} kcal</div>
          <div class="l">This week (${cum.weekDays} day${cum.weekDays===1?'':'s'})</div>
        </div>
        <div class="progress-cell">
          <div class="v">${weekKg>=0?'−':'+'}${Math.abs(weekKg).toFixed(2)} kg</div>
          <div class="l">Week estimate</div>
        </div>
      </div>
      <div class="progress-note">${hint}</div>
    </div>
  `;
}

function renderMealBlock(key,label,items){
  items = items || [];
  const totals = sumMacros(items);
  let rows = items.map((it,idx)=>{
    if(state.editing && state.editing.meal===key && state.editing.index===idx) return editFormHtml(key,idx,it);
    return `
      <div class="item-row">
        <div class="item-main"><div class="item-name">${esc(it.name)}</div><div class="item-qty">${esc(it.qty||'')}</div></div>
        <div class="item-macros">${Math.round(it.cal)} kcal<br>${Math.round(it.protein)}g P · ${Math.round(it.fiber)}g F</div>
        <button class="icon-btn" onclick="startEdit('${key}',${idx})" title="Edit">✎</button>
        <button class="icon-btn danger" onclick="deleteItem('${key}',${idx})" title="Remove">×</button>
      </div>`;
  }).join('');
  if(state.editing && state.editing.meal===key && state.editing.index==='new'){
    rows += editFormHtml(key,'new',{name:'',qty:'',cal:'',protein:'',fiber:''});
  }
  if(items.length===0 && !(state.editing && state.editing.meal===key && state.editing.index==='new')){
    rows = `<div class="empty-note">Nothing logged yet.</div>` + rows;
  }
  return `
    <div class="card meal-block">
      <h2>${label} <span class="cnt">${Math.round(totals.cal)} kcal · ${Math.round(totals.protein)}g P</span></h2>
      ${rows}
      <button class="add-item-btn" onclick="startEdit('${key}','new')">+ Add item</button>
    </div>`;
}

function editFormHtml(meal, idx, it){
  return `
    <div class="edit-form">
      <input class="full" id="ef-name" placeholder="Food name" value="${esc(it.name)}">
      <input class="full" id="ef-qty" placeholder="Quantity (e.g. 150g)" value="${esc(it.qty)}">
      <div class="macro-inputs">
        <div><label>Calories</label><input id="ef-cal" type="number" value="${it.cal!==''?it.cal:''}"></div>
        <div><label>Protein g</label><input id="ef-protein" type="number" value="${it.protein!==''?it.protein:''}"></div>
        <div><label>Fiber g</label><input id="ef-fiber" type="number" value="${it.fiber!==''?it.fiber:''}"></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-cancel" onclick="cancelEdit()">Cancel</button>
        <button class="btn btn-save" onclick="saveEdit('${meal}',${JSON.stringify(idx)})">Save</button>
      </div>
    </div>`;
}

function ringSVG(rings){
  const cx=50,cy=50; let circles='';
  rings.forEach(r=>{
    const circ=2*Math.PI*r.r;
    const offset=circ*(1-r.pct);
    circles += `
      <circle cx="${cx}" cy="${cy}" r="${r.r}" fill="none" stroke="var(--line)" stroke-width="7"/>
      <circle cx="${cx}" cy="${cy}" r="${r.r}" fill="none" stroke="${r.color}" stroke-width="7"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>`;
  });
  return `<svg width="100" height="100" viewBox="0 0 100 100" style="flex-shrink:0">${circles}</svg>`;
}

function renderWeek(pd){
  const chips = DAYS.map(d=>`<div class="day-chip ${d===state.weekDayPicked?'active':''}" onclick="pickWeekDay('${d}')">${d}</div>`).join('');
  const dayPlan = pd.plan[state.weekDayPicked] || emptyDayPlan();
  let mealsHtml='';
  MEAL_TYPES.forEach(([k,l])=>{ mealsHtml += renderTemplateMealBlock(k,l,dayPlan[k]); });
  return `
    <div class="card">
      <h2>This week's average <span class="cnt">from what you logged</span></h2>
      ${weekSummaryHtml(pd)}
    </div>
    <div class="day-picker">${chips}</div>
    ${mealsHtml}`;
}

function weekSummaryHtml(pd){
  const monday = mondayOfThisWeekISO();
  let count=0,calSum=0,proSum=0;
  Object.keys(pd.logs).forEach(ds=>{
    if(ds<monday) return;
    const t = logTotals(pd.logs[ds]);
    if(t.cal>0){ count++; calSum+=t.cal; proSum+=t.protein; }
  });
  if(count===0) return `<div class="empty-note">No days logged yet this week — open "Today" to start.</div>`;
  return `
    <div class="week-summary">
      <div class="stat"><div class="v">${Math.round(calSum/count)}</div><div class="l">Avg kcal</div></div>
      <div class="stat"><div class="v">${Math.round(proSum/count)}g</div><div class="l">Avg protein</div></div>
    </div>
    <div class="week-note">Based on ${count} logged day${count>1?'s':''} this week</div>`;
}

function renderTemplateMealBlock(key,label,items){
  items = items||[];
  let rows = items.map((it,idx)=>{
    if(state.editing && state.editing.meal===('tpl:'+key) && state.editing.index===idx) return editFormHtml('tpl:'+key,idx,it);
    return `
      <div class="item-row">
        <div class="item-main"><div class="item-name">${esc(it.name)}</div><div class="item-qty">${esc(it.qty||'')}</div></div>
        <div class="item-macros">${Math.round(it.cal)} kcal<br>${Math.round(it.protein)}g P · ${Math.round(it.fiber)}g F</div>
        <button class="icon-btn" onclick="startEdit('tpl:${key}',${idx})" title="Edit">✎</button>
        <button class="icon-btn danger" onclick="deleteItem('tpl:${key}',${idx})" title="Remove">×</button>
      </div>`;
  }).join('');
  if(state.editing && state.editing.meal===('tpl:'+key) && state.editing.index==='new'){
    rows += editFormHtml('tpl:'+key,'new',{name:'',qty:'',cal:'',protein:'',fiber:''});
  }
  if(items.length===0 && !(state.editing && state.editing.meal===('tpl:'+key) && state.editing.index==='new')){
    rows = `<div class="empty-note">No plan set for ${state.weekDayPicked} yet.</div>` + rows;
  }
  return `
    <div class="card meal-block">
      <h2>${label}</h2>
      ${rows}
      <button class="add-item-btn" onclick="startEdit('tpl:${key}','new')">+ Add item</button>
    </div>`;
}

function renderSettings(pd){
  const t = pd.targets;
  const milestoneRows = pd.milestones.length
    ? pd.milestones.slice().reverse().map((m,i)=>{
        const realIdx = pd.milestones.length-1-i;
        return `<div class="milestone-row"><span class="date">${esc(m.date)}</span><span class="txt">${esc(m.note)}</span><button class="icon-btn danger" onclick="deleteMilestone(${realIdx})">×</button></div>`;
      }).join('')
    : `<div class="empty-note">No milestones logged yet.</div>`;

  let syncStatusLine = '';
  if(!store.apiUrl) syncStatusLine = `<div class="sync-status">Not connected — data stays on this device.</div>`;
  else if(store.syncState==='ok') syncStatusLine = `<div class="sync-status ok">Connected. Last sync: ${store.lastSyncAt?store.lastSyncAt.toLocaleTimeString():'—'}</div>`;
  else if(store.syncState==='syncing') syncStatusLine = `<div class="sync-status">Syncing…</div>`;
  else if(store.syncState==='error') syncStatusLine = `<div class="sync-status err">Sync error: ${esc(store.lastError||'unknown')}</div>`;
  else syncStatusLine = `<div class="sync-status">Ready to connect.</div>`;

  const testMsg = state.syncMsg ? `<div class="sync-status ${state.syncMsg.ok?'ok':'err'}">${esc(state.syncMsg.text)}</div>` : '';

  return `
    <div class="card">
      <h2>Daily targets</h2>
      <div class="field-row"><label>Calories</label><input type="number" value="${t.calories}" onchange="setTarget('calories',this.value)"></div>
      <div class="field-row"><label>Protein (g)</label><input type="number" value="${t.protein}" onchange="setTarget('protein',this.value)"></div>
      <div class="field-row"><label>Fiber (g)</label><input type="number" value="${t.fiber}" onchange="setTarget('fiber',this.value)"></div>
    </div>

    <div class="card">
      <h2>Google Sheets sync</h2>
      <div class="sync-config">
        <input class="url-input" id="api-url" placeholder="Paste your Apps Script web-app URL" value="${esc(store.apiUrl||'')}">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="saveApiUrl()">Save URL</button>
          <button class="btn btn-secondary" onclick="testSync()">Test connection</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="pullFromSheets()">Pull from Sheets</button>
          <button class="btn btn-secondary" onclick="pushToSheets()">Push to Sheets</button>
        </div>
        ${syncStatusLine}
        ${testMsg}
        <div class="hint">Paste the web-app URL from your Apps Script deployment. Once set, every save syncs to your Google Sheet. "Pull" replaces local data with what's in Sheets; "Push" sends your current local data up.</div>
      </div>
    </div>

    <div class="card">
      <h2>Milestones & rewards</h2>
      ${milestoneRows}
      <div class="milestone-form">
        <input type="date" id="ms-date" value="${todayISO()}">
        <input type="text" id="ms-note" placeholder="e.g. −2kg → new leggings">
      </div>
      <button class="add-item-btn" style="margin-top:8px" onclick="addMilestone()">+ Add milestone</button>
      <div class="hint">Use this for your own rewards — a small treat when you hit a milestone.</div>
    </div>
  `;
}

/* ============ ACTIONS ============ */
function switchPerson(p){
  state.person=p; state.tab='today'; state.editing=null; state.syncMsg=null;
  state.loading = !state.data[p];
  render();
  if(!state.data[p]) loadPerson(p).then(()=>{ state.loading=false; render(); });
}
function switchTab(t){ state.tab=t; state.editing=null; state.syncMsg=null; render(); }
function pickWeekDay(d){ state.weekDayPicked=d; state.editing=null; render(); }
function startEdit(meal,index){ state.editing={meal,index}; render(); }
function cancelEdit(){ state.editing=null; render(); }

async function saveEdit(meal,index){
  const name = document.getElementById('ef-name').value.trim();
  const qty  = document.getElementById('ef-qty').value.trim();
  const cal  = Number(document.getElementById('ef-cal').value)||0;
  const protein = Number(document.getElementById('ef-protein').value)||0;
  const fiber   = Number(document.getElementById('ef-fiber').value)||0;
  if(!name){ state.editing=null; render(); return; }
  const item = {name,qty,cal,protein,fiber};
  const pd = state.data[state.person];
  if(meal.startsWith('tpl:')){
    const key = meal.slice(4);
    const dayPlan = pd.plan[state.weekDayPicked];
    if(index==='new') dayPlan[key].push(item); else dayPlan[key][index]=item;
  } else {
    const log = pd.logs[todayISO()];
    if(index==='new') log.meals[meal].push(item); else log.meals[meal][index]=item;
  }
  state.editing=null;
  render();
  await save();
}

async function deleteItem(meal,index){
  const pd = state.data[state.person];
  if(meal.startsWith('tpl:')){
    const key=meal.slice(4);
    pd.plan[state.weekDayPicked][key].splice(index,1);
  } else {
    pd.logs[todayISO()].meals[meal].splice(index,1);
  }
  render();
  await save();
}

async function setBurned(val){
  const log = state.data[state.person].logs[todayISO()];
  log.caloriesBurned = val===''?null:Number(val);
  render();
  await save();
}

async function resetTodayToPlan(){
  const pd = state.data[state.person];
  const dateStr = todayISO();
  const dayName = dayNameForDate(dateStr);
  const template = pd.plan[dayName] || emptyDayPlan();
  pd.logs[dateStr] = {
    meals:{
      breakfast: JSON.parse(JSON.stringify(template.breakfast||[])),
      lunch: JSON.parse(JSON.stringify(template.lunch||[])),
      dinner: JSON.parse(JSON.stringify(template.dinner||[])),
      snack: JSON.parse(JSON.stringify(template.snack||[]))
    },
    caloriesBurned: null
  };
  render();
  await save();
}

async function setTarget(field,val){
  state.data[state.person].targets[field] = Number(val)||0;
  render();
  await save();
}

async function addMilestone(){
  const date = document.getElementById('ms-date').value || todayISO();
  const note = document.getElementById('ms-note').value.trim();
  if(!note) return;
  state.data[state.person].milestones.push({date,note});
  render();
  await save();
}

async function deleteMilestone(idx){
  state.data[state.person].milestones.splice(idx,1);
  render();
  await save();
}

function saveApiUrl(){
  const url = document.getElementById('api-url').value;
  store.setApiUrl(url);
  state.syncMsg = {ok:true, text: url ? 'URL saved. Try "Test connection" or "Pull from Sheets" next.' : 'URL cleared. Sync disabled.'};
  render();
}

async function testSync(){
  const res = await store.testConnection();
  state.syncMsg = res.ok ? {ok:true, text:'Connection works! You\'re good to go.'} : {ok:false, text: 'Connection failed: '+res.error};
  render();
}

async function pullFromSheets(){
  state.syncMsg = null;
  for(const p of PEOPLE){
    state.data[p] = await store.loadPerson(p);
  }
  state.syncMsg = store.syncState==='ok' ? {ok:true, text:'Pulled from Sheets.'} : {ok:false, text:'Pull failed: '+(store.lastError||'unknown')};
  render();
}

async function pushToSheets(){
  state.syncMsg = null;
  for(const p of PEOPLE){
    if(state.data[p]) await store.savePerson(p, state.data[p]);
  }
  state.syncMsg = store.syncState==='ok' ? {ok:true, text:'Pushed to Sheets.'} : {ok:false, text:'Push failed: '+(store.lastError||'unknown')};
  render();
}

/* ============ BOOT ============ */
(async function init(){
  render();
  for(const p of PEOPLE) await loadPerson(p);
  state.loading=false;
  render();
})();
</script>
</body>
</html>
